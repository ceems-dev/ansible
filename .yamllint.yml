---
extends: default

rules:
  braces:
    max-spaces-inside: 1
    level: error
  brackets:
    max-spaces-inside: 1
    level: error
  colons:
    max-spaces-after: -1
    level: error
  commas:
    max-spaces-after: -1
    level: error
  comments:
    min-spaces-from-content: 1
    level: error
  comments-indentation: false
  empty-lines:
    max: 3
    level: error
  hyphens:
    level: error
  line-length:
    max: 200
  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: true
  truthy:
    check-keys: false

ignore: |
  changelogs/.plugin-cache.yaml
